# ============================================================
# Perfil "render" — usado quando a aplicação roda no Render.com
# (banco PostgreSQL gerenciado pelo próprio Render, em vez do SQL Server
# da empresa, que será usado depois no deploy final via IIS).
#
# Ativado definindo a variável de ambiente SPRING_PROFILES_ACTIVE=render
# (o render.yaml incluso já faz isso automaticamente).
# ============================================================

# O render.yaml incluso já mapeia essas variáveis automaticamente a partir
# do banco Postgres criado pelo próprio Render (ver RENDER.md).
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.locations=classpath:db/migration-postgres
