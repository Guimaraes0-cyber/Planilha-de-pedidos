server.port=8080

# ---------- Banco de dados SQL Server ----------
# Os valores abaixo são apenas o PADRÃO (fallback). Em produção, defina as
# variáveis de ambiente DB_URL, DB_USERNAME e DB_PASSWORD no servidor —
# assim a senha real nunca precisa ficar escrita neste arquivo nem no Git.
spring.datasource.url=${DB_URL:jdbc:sqlserver://HOST:1433;databaseName=NOME_DO_BANCO;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:SEU_USUARIO}
spring.datasource.password=${DB_PASSWORD:SUA_SENHA}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=false

# ---------- Flyway (cria as tabelas automaticamente na primeira vez) ----------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---------- Segurança / JWT ----------
# IMPORTANTE: em produção, defina a variável de ambiente JWT_SECRET com uma
# string aleatória longa e secreta — não deixe o valor real neste arquivo.
app.jwt.secret=${JWT_SECRET:TROQUE_ESSA_CHAVE_POR_UMA_STRING_ALEATORIA_BEM_LONGA_E_SECRETA_1234567890}
app.jwt.expiration-ms=28800000

# ---------- Usuário admin master (criado automaticamente no primeiro start) ----------
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.senha-inicial=${ADMIN_SENHA_INICIAL:Adm@2026}
