<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de DAE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --paper:#EDEDF3;
    --paper-card:#FFFFFF;
    --ink:#1B2436;
    --ink-soft:#525C70;
    --line:#D9DCE3;
    --red:#A63B2E;
    --red-bg:#F7E7E4;
    --green:#2E6B4F;
    --green-bg:#E4EFE9;
    --amber:#B8863A;
    --amber-bg:#F6EDDD;
    --blue-accent:#2C3B5C;
    --brand:#D6127D;
    --brand-dark:#A80F65;
    --brand-bg:#FCE8F3;
    --store-igt:#D6127D;
    --store-rm:#2F6FED;
    --store-clz:#DB8A1F;
    --radius:10px;
    --shadow: 0 1px 2px rgba(27,36,54,0.06), 0 4px 14px rgba(27,36,54,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  #root{max-width:1180px;margin:0 auto;padding:28px 20px 60px;}

  /* ---------- App shell / sidebar ---------- */
  .app-shell{display:flex;gap:22px;align-items:flex-start;}
  .sidebar{
    width:200px;flex-shrink:0;background:var(--paper-card);border-radius:12px;
    box-shadow:var(--shadow);padding:14px 10px;position:sticky;top:20px;
  }
  .sidebar-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink-soft);padding:8px 12px 4px;}
  .sidebar-item{
    display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:8px;
    cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:2px;
    transition:background .12s ease, color .12s ease;
  }
  .sidebar-item:hover:not(.active){background:#F5F6F8;color:var(--ink);}
  .sidebar-item.active{background:var(--brand);color:#fff;}
  .sidebar-icon{width:16px;text-align:center;flex-shrink:0;}
  .sidebar-divider{height:1px;background:var(--line);margin:10px 4px;}
  .main-content{flex:1;min-width:0;}
  @media (max-width:820px){
    .app-shell{flex-direction:column;}
    .sidebar{width:100%;position:static;display:flex;flex-wrap:wrap;gap:4px;}
    .sidebar-label{display:none;}
    .sidebar-item{margin-bottom:0;}
  }

  /* ---------- Header ---------- */
  .app-header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;}
  .wordmark-row{display:flex;align-items:center;gap:14px;}
  .wordmark-badge{
    width:46px;height:46px;border-radius:50%;
    border:2px solid var(--brand);
    display:flex;align-items:center;justify-content:center;
    font-family:'Source Serif 4',serif;font-weight:700;font-size:16px;color:var(--brand);
    flex-shrink:0;
  }
  .wordmark{font-family:'Source Serif 4',serif;font-weight:700;font-size:26px;letter-spacing:0.2px;margin:0;color:var(--brand-dark);}
  .subtitle{color:var(--ink-soft);font-size:11.5px;margin-top:2px;letter-spacing:1px;text-transform:uppercase;}
  .btn{
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
    border:none;border-radius:8px;padding:10px 16px;cursor:pointer;
    transition:transform .08s ease, box-shadow .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-primary:hover{box-shadow:0 3px 10px rgba(214,18,125,0.35);}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px dashed var(--line);}
  .btn-ghost:hover{border-color:var(--brand);color:var(--brand);}
  .btn-danger{background:transparent;color:var(--red);}
  .btn-danger:hover{text-decoration:underline;}
  .btn-sm{padding:6px 10px;font-size:12.5px;border-radius:6px;}

  /* ---------- Store nav cards ---------- */
  .status-bar{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:12px 18px;margin-bottom:16px;font-size:13px;
  }
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;}
  .pill{
    display:inline-flex;align-items:center;gap:6px;border-radius:50px;padding:4px 12px;
    font-size:12px;font-weight:600;border:1.5px solid currentColor;
  }
  .pill-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  .nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px;}
  @media (max-width:820px){ .nav-grid{grid-template-columns:repeat(2,1fr);} }
  .nav-card{
    background:var(--paper-card);border-radius:12px;border:2px solid transparent;
    box-shadow:var(--shadow);padding:20px 14px;text-align:center;cursor:pointer;
    transition:all .15s ease;
  }
  .nav-card:hover{transform:translateY(-2px);}
  .nav-card.active{background:#181818;border-color:var(--brand);box-shadow:0 4px 18px rgba(214,18,125,0.35);}
  .nav-card.active .nav-card-label{color:#fff;}
  .nav-card.active .nav-wordmark-intimissimi, .nav-card.active .nav-wordmark-calzedonia{color:#fff;}
  .nav-card-icon{font-size:22px;margin-bottom:8px;}
  .nav-card-label{font-size:12.5px;font-weight:600;color:var(--ink);margin-top:8px;}
  .nav-wordmark-intimissimi{
    font-family:'Inter',sans-serif;font-weight:300;font-size:16px;letter-spacing:3px;
    text-transform:lowercase;color:var(--ink);height:22px;display:flex;align-items:center;justify-content:center;
  }
  .nav-wordmark-calzedonia{
    font-family:'Inter',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.5px;
    text-transform:uppercase;color:var(--ink);height:22px;display:flex;align-items:center;justify-content:center;
  }

  /* ---------- Login screen ---------- */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-card{
    background:var(--paper-card);border-radius:16px;box-shadow:0 20px 60px rgba(27,36,54,0.15);
    padding:38px 34px;max-width:380px;width:100%;text-align:center;
  }
  .auth-badge{
    width:56px;height:56px;border-radius:50%;background:var(--brand-bg);color:var(--brand-dark);
    display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
    font-family:'Source Serif 4',serif;font-weight:700;font-size:19px;
  }
  .auth-title{font-family:'Source Serif 4',serif;font-weight:700;font-size:21px;color:var(--brand-dark);margin:0 0 4px;}
  .auth-sub{color:var(--ink-soft);font-size:13px;margin:0 0 24px;}
  .auth-field{text-align:left;margin-bottom:14px;}
  .auth-field label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;}
  .auth-field input{width:100%;padding:10px 12px;font-size:14px;border-radius:8px;border:1px solid var(--line);}
  .auth-error{color:var(--red);font-size:12.5px;margin:-6px 0 12px;text-align:left;}
  .auth-note{font-size:11px;color:var(--ink-soft);margin-top:18px;line-height:1.5;}
  .auth-link{background:none;border:none;color:var(--brand);font-size:12.5px;font-weight:600;cursor:pointer;margin-top:10px;text-decoration:underline;}

  /* ---------- Cards / Stamp ---------- */
  .card{
    background:var(--paper-card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px 22px;
  }
  .store-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px;}
  @media (max-width:820px){ .store-grid{grid-template-columns:1fr;} }
  .dist-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:26px;}
  .store-card{transition:box-shadow .15s ease;}
  .store-card:hover{box-shadow:0 2px 6px rgba(27,36,54,0.1), 0 8px 20px rgba(27,36,54,0.1);}
  .store-card-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .store-name{font-family:'Source Serif 4',serif;font-weight:600;font-size:19px;margin:0 0 2px;}
  .store-loja-code{color:var(--ink-soft);font-size:12px;letter-spacing:0.6px;text-transform:uppercase;}
  .store-total{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:26px;margin:14px 0 4px;}
  .store-total-label{color:var(--ink-soft);font-size:12px;}
  .store-next{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);font-size:12.5px;color:var(--ink-soft);}
  .store-next b{color:var(--ink);}

  .stamp{
    display:inline-flex;align-items:center;justify-content:center;
    font-family:'Source Serif 4',serif;font-weight:700;font-size:10px;letter-spacing:0.8px;
    text-transform:uppercase;border-radius:50px;padding:4px 10px;
    border:1.5px solid currentColor;transform:rotate(-3deg);white-space:nowrap;
  }
  .stamp-pago{color:var(--green);background:var(--green-bg);}
  .stamp-vencido{color:var(--red);background:var(--red-bg);}
  .stamp-urgente{color:var(--amber);background:var(--amber-bg);}
  .stamp-pendente{color:var(--ink-soft);background:#EEF0F3;}

  .summary-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:22px;}
  .summary-chip{
    background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px 20px;flex:1;min-width:180px;
  }
  .summary-chip-label{font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
  .summary-chip-value{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:20px;}
  .summary-chip-value.red{color:var(--red);}
  .summary-chip-value.green{color:var(--green);}

  .section-title{font-family:'Source Serif 4',serif;font-weight:600;font-size:16px;margin:0 0 12px;}

  /* ---------- Table ---------- */
  .table-wrap{overflow-x:auto;background:var(--paper-card);border-radius:var(--radius);box-shadow:var(--shadow);}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px;}
  table.table-detailed{min-width:1520px;}
  thead th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;
    color:var(--ink-soft);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{padding:11px 14px;border-bottom:1px solid #EEF0F3;vertical-align:middle;white-space:nowrap;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FAFBFC;}
  .num{font-family:'IBM Plex Mono',monospace;}
  .muted{color:var(--ink-soft);}
  .empty-state{padding:48px 20px;text-align:center;color:var(--ink-soft);}
  .empty-state b{color:var(--ink);display:block;font-size:15px;margin-bottom:4px;font-family:'Source Serif 4',serif;}

  .row-actions{display:flex;gap:6px;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
  .filter-group{display:flex;gap:6px;}
  select, input[type=text], input[type=number], input[type=date], textarea{
    font-family:'Inter',sans-serif;font-size:13.5px;padding:8px 10px;border-radius:7px;
    border:1px solid var(--line);background:#fff;color:var(--ink);
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--blue-accent);outline-offset:1px;}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(27,36,54,0.45);
    display:none;align-items:flex-start;justify-content:center;
    padding:40px 16px;overflow-y:auto;z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:#fff;border-radius:14px;max-width:560px;width:100%;
    padding:26px 28px 24px;box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-title{font-family:'Source Serif 4',serif;font-weight:600;font-size:19px;margin:0 0 4px;}
  .modal-sub{color:var(--ink-soft);font-size:13px;margin:0 0 18px;}
  .modal-lg{max-width:960px;}
  .dropzone{
    border:1.5px dashed var(--line);border-radius:10px;padding:28px 20px;text-align:center;
    color:var(--ink-soft);font-size:13.5px;cursor:pointer;transition:border-color .15s ease, background .15s ease;
  }
  .dropzone:hover, .dropzone.drag{border-color:var(--blue-accent);background:#F5F7FA;}
  .dropzone b{color:var(--ink);display:block;font-family:'Source Serif 4',serif;font-size:15px;margin-bottom:4px;}
  .import-table-wrap{max-height:360px;overflow:auto;border:1px solid var(--line);border-radius:8px;margin-top:16px;}
  .import-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:760px;}
  .import-table th{position:sticky;top:0;background:#F5F6F8;text-align:left;padding:8px 10px;font-size:10.5px;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--line);white-space:nowrap;}
  .import-table td{padding:6px 8px;border-bottom:1px solid #EEF0F3;vertical-align:middle;}
  .import-table input, .import-table select{width:100%;padding:5px 6px;font-size:12.5px;border-radius:5px;}
  .import-note{font-size:11.5px;color:var(--ink-soft);margin-top:6px;}
  .badge-auto{font-size:10px;color:var(--green);font-weight:600;}
  .badge-manual{font-size:10px;color:var(--amber);font-weight:600;}

  .seed-box{background:var(--brand-bg);border:1px solid #F3C6E1;border-radius:10px;padding:14px 16px;}
  .seed-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .seed-inner b{font-family:'Source Serif 4',serif;font-size:14.5px;color:var(--brand-dark);}

  .import-store-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:6px;}
  @media (max-width:680px){ .import-store-grid{grid-template-columns:1fr;} }
  .import-store-card{background:#F7F8FA;border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center;}
  .import-store-shopping{font-size:12px;color:var(--ink-soft);margin-top:6px;}
  .import-store-count{font-size:11px;color:var(--ink-soft);margin-top:8px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;}
  .form-grid.full{grid-template-columns:1fr;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field.span-2{grid-column:1/-1;}
  .field label{font-size:12px;font-weight:600;color:var(--ink-soft);}
  .field .hint{font-size:11px;color:var(--ink-soft);font-weight:400;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;color:var(--ink-soft);gap:10px;}
  .spinner{width:26px;height:26px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--blue-accent);animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (max-width:560px){
    .form-grid{grid-template-columns:1fr;}
    table{min-width:640px;}
  }
</style>
</head>

    state.authError = '';
    render();
    await loadAll();
    render();
  } else {
    state.authError = 'Usuário ou senha incorretos.';
    render();
  }
  return false;
}

// ---------- storage helpers ----------
async function loadAll(){
  for(const code of STORE_KEYS){
    try{
      const res = await window.storage.get('pedidos-'+code, false);
      state.pedidos[code] = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){
      state.pedidos[code] = [];
    }
  }
  try{
    const res = await window.storage.get('boletos-dae', false);
    state.boletos = res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    state.boletos = [];
  }
  state.loaded = true;
}
async function saveBoletos(){
  try{
    const ok = await window.storage.set('boletos-dae', JSON.stringify(state.boletos), false);
    if(!ok) console.error('Falha ao salvar boletos');
  }catch(e){
    console.error('Erro de storage (boletos)', e);
  }
}
async function saveStore(code){
  try{
    const ok = await window.storage.set('pedidos-'+code, JSON.stringify(state.pedidos[code]), false);
    if(!ok) console.error('Falha ao salvar', code);
  }catch(e){
    console.error('Erro de storage', e);
  }
}

// ---------- utils ----------
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtBRL(n){
  n = Number(n)||0;
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function fmtDateBR(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return d+'/'+m+'/'+y;
}
function daysUntil(iso){
  if(!iso) return null;
  const target = new Date(iso+'T00:00:00');
  const now = new Date(todayISO()+'T00:00:00');
  return Math.round((target-now)/86400000);
}
function statusFor(p){
  if(p.status === 'pago') return 'pago';
  if(!p.vencimento) return 'pendente';
  const d = daysUntil(p.vencimento);
  if(d < 0) return 'vencido';
  if(d <= 7) return 'urgente';
  return 'pendente';
}
function stampLabel(s){
  return { pago:'Pago', vencido:'Vencido', urgente:'Vencendo', pendente:'Pendente' }[s];
}
function selagemStatus(p){
  if(p.status !== 'pago') return 'aguardando';
  const diff = (Number(p.valorDae)||0) - (Number(p.valorPago)||0);
  return Math.abs(diff) < 1 ? 'ok' : 'erro';
}
function selagemLabel(s){
  return { ok:'OK', erro:'Precisa selagem', aguardando:'Aguardando pgto.' }[s];
}
function selagemClass(s){
  return { ok:'stamp-pago', erro:'stamp-vencido', aguardando:'stamp-pendente' }[s];
}
function selagemDiff(p){
  if(p.status !== 'pago') return null;
  return (Number(p.valorDae)||0) - (Number(p.valorPago)||0);
}
function esc(str){
  return (str==null?'':String(str)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ---------- computed ----------
function storeStats(code){
  const list = state.pedidos[code];
  const pendentes = list.filter(p=>p.status!=='pago');
  const totalPendente = pendentes.reduce((s,p)=>s+(Number(p.valorDae)||0),0);
  const thisMonth = todayISO().slice(0,7);
  const totalPagoMes = list.filter(p=>p.status==='pago' && p.dataPagamento && p.dataPagamento.slice(0,7)===thisMonth)
                            .reduce((s,p)=>s+(Number(p.valorPago ?? p.valorDae)||0),0);
  const proximos = pendentes.filter(p=>p.vencimento).sort((a,b)=>a.vencimento.localeCompare(b.vencimento));
  const comErro = list.filter(p=>selagemStatus(p)==='erro');
  return { totalPendente, totalPagoMes, proximo: proximos[0]||null, countPendente: pendentes.length, comErro };
}
function allPendentesOrdenados(){
  let all = [];
  STORE_KEYS.forEach(code=>{
    state.pedidos[code].filter(p=>p.status!=='pago' && p.vencimento).forEach(p=>{
      all.push(Object.assign({}, p, {_loja:code}));
    });
  });
  all.sort((a,b)=>a.vencimento.localeCompare(b.vencimento));
  return all;
}
function pedidoCategoria(pedido){
  const up = (pedido||'').toUpperCase();
  if(up.includes('RESSUPRIMENTO')) return 'Ressuprimento';
  if(up.includes('TRANCHE')) return 'Tranche';
  if(up.includes('BRINDE')) return 'Brinde';
  if(up.includes('SEM PEDIDO')) return 'Sem pedido de venda';
  return 'Outros';
}
const CATEGORIA_CORES = {
  'Ressuprimento':'#D6127D',
  'Tranche':'#2F6FED',
  'Brinde':'#DB8A1F',
  'Sem pedido de venda':'#8B8FA3',
  'Outros':'#2E6B4F'
};
function computeTipoPedidoBreakdown(){
  const counts = {};
  STORE_KEYS.forEach(code=>{
    state.pedidos[code].forEach(p=>{
      const cat = pedidoCategoria(p.pedido);
      counts[cat] = (counts[cat]||0) + 1;
    });
  });
  const labels = Object.keys(counts);
  return {
    labels,
    values: labels.map(l=>counts[l]),
    colors: labels.map(l=>CATEGORIA_CORES[l]||'#8B8FA3')
  };
}
function allAguardandoEntrega(){
  let all = [];
  STORE_KEYS.forEach(code=>{
    state.pedidos[code].forEach(p=>{
      const isRealShipment = p.qt!=null || p.previsaoEntrega || pedidoCategoria(p.pedido)!=='Sem pedido de venda';
      if(!p.recebimento && isRealShipment && pedidoCategoria(p.pedido)!=='Sem pedido de venda'){
        all.push(Object.assign({}, p, {_loja:code}));
      }
    });
  });
  all.sort((a,b)=>{
    if(!a.previsaoEntrega && !b.previsaoEntrega) return 0;
    if(!a.previsaoEntrega) return 1;
    if(!b.previsaoEntrega) return -1;
    return a.previsaoEntrega.localeCompare(b.previsaoEntrega);
  });
  return all;
}
function updatePrevisao(code, id, value){
  const p = state.pedidos[code].find(x=>x.id===id);
  if(p){ p.previsaoEntrega = value || null; saveStore(code); }
}
function marcarRecebido(code, id){
  const p = state.pedidos[code].find(x=>x.id===id);
  if(p){ p.recebimento = todayISO(); saveStore(code); render(); }
}

    root.innerHTML = `<div class="loading-screen"><div class="spinner"></div><div>Carregando dados…</div></div>`;

  if(state.activeTab==='overview') mainBody = renderOverview();

function initOverviewChart(){
  if(tipoPedidoChartInstance){ tipoPedidoChartInstance.destroy(); tipoPedidoChartInstance = null; }
  const canvas = document.getElementById('tipoPedidoChart');
  if(!canvas || typeof Chart === 'undefined') return;
  const data = computeTipoPedidoBreakdown();
  if(!data.labels.length) return;
  tipoPedidoChartInstance = new Chart(canvas, {
    type: 'doughnut',
    data: { labels: data.labels, datasets: [{ data: data.values, backgroundColor: data.colors, borderWidth: 2, borderColor: '#fff' }] },
    options: { plugins: { legend: { display: false }, tooltip: { enabled: true } }, cutout: '65%' }
  });
}

  for(const code of STORE_KEYS){
    const p = state.pedidos[code].find(x=>x.nfNumero===nfNumero);
    if(p) return { code, pedido: p };
  }
  return null;
}

function renderBoletos(){
  const list = state.boletos.slice().sort((a,b)=> (b.data||'').localeCompare(a.data||''));
  const rows = list.length ? list.map(b=>{
    const totalDae = b.notas.reduce((s,n)=>s+(Number(n.valorDae)||0),0);
    const diferenca = (Number(b.valorPago)||0) - totalDae;
    const nfsTxt = b.notas.map(n=>{
      const found = findPedidoByNF(n.nfNumero);
      const okBadge = found ? `<span class="badge-auto" title="Encontrada em ${STORE_META[found.code].nome}">vinculada</span>` : `<span class="badge-manual" title="Nenhum pedido lançado com esse NF ainda">NF não encontrada</span>`;
      return `${esc(n.nfNumero)} (${fmtBRL(n.valorDae)}) ${okBadge}`;

function updateBoletoNota(uidVal, field, val){
  const n = window._boletoDraft.notas.find(x=>x._uid===uidVal);
  if(n) n[field] = val;
}
function addBoletoNota(){
  window._boletoDraft.notas.push({_uid:uid(), nfNumero:'', valorDae:''});
  document.getElementById('modalBody').innerHTML = renderBoletoForm();
}
function removeBoletoNota(uidVal){
  window._boletoDraft.notas = window._boletoDraft.notas.filter(x=>x._uid!==uidVal);
  if(!window._boletoDraft.notas.length) window._boletoDraft.notas.push({_uid:uid(), nfNumero:'', valorDae:''});
  document.getElementById('modalBody').innerHTML = renderBoletoForm();
}
async function saveBoleto(){
  const draft = window._boletoDraft;
  const notasLimpas = draft.notas
    .map(n=>({ nfNumero: (n.nfNumero||'').trim(), valorDae: parseFloat(n.valorDae)||0 }))
    .filter(n=>n.nfNumero);
  if(!notasLimpas.length){ alert('Adicione pelo menos uma nota com o número da NF.'); return; }

  const record = {
    id: draft.id || uid(),
    data: draft.data || todayISO(),
    valorPago: parseFloat(draft.valorPago)||0,
    notas: notasLimpas
  };
  if(draft.id){
    const idx = state.boletos.findIndex(b=>b.id===draft.id);
    state.boletos[idx] = record;
  } else {
    state.boletos.push(record);
  }
  await saveBoletos();

  // concilia automaticamente: marca cada NF como paga na loja correspondente
  const touched = new Set();
  let vinculadas = 0;
  for(const n of notasLimpas){
    const found = findPedidoByNF(n.nfNumero);
    if(found){
      found.pedido.status = 'pago';
      found.pedido.dataPagamento = record.data;
      found.pedido.valorPago = n.valorDae;
      touched.add(found.code);
      vinculadas++;
    }
  }
  for(const code of touched) await saveStore(code);

  closeModal();
  render();
  if(vinculadas < notasLimpas.length){
    alert(`Boleto salvo. ${vinculadas} de ${notasLimpas.length} nota(s) foram encontradas e marcadas como pagas. As demais não têm pedido lançado ainda com esse número de NF — lance o pedido primeiro e edite este boleto depois.`);
  }
}
function deleteBoleto(id){
  if(!confirm('Excluir este boleto? Isso não desfaz o pagamento já marcado nos pedidos vinculados.')) return;
  state.boletos = state.boletos.filter(b=>b.id!==id);
  saveBoletos();
  render();
}

let importPreview = []; // { _uid, loja, lojaAuto, data, dataAuto, pedido, nfNumero, nfAuto, valorFaturado, valorAuto, fileName, warn }

function detectLoja(text){
  const up = text.toUpperCase();
  // A Calzedonia é o FORNECEDOR de todas as lojas (aparece em toda nota) — não serve pra identificar destino.
  // O destino certo vem do nome do destinatário na nota:
  if(up.includes('NELY') && up.includes('CUNHA')) return 'IGT';   // Intimissimi Iguatemi
  if((up.includes('LIVIA') || up.includes('LÍVIA')) && up.includes('CUNHA')) return 'RM'; // Intimissimi Riomar
  if(up.includes('VIA BOSQUE')) return 'CLZ';
  if(up.includes('IGUATEMI')) return 'IGT';
  if(up.includes('RIOMAR') || up.includes('RIO MAR')) return 'RM';
  return null;
}

function decodeChave(text){
  // procura uma sequência de 44 dígitos (a chave de acesso da NF-e), com ou sem espaços
  let chave = null;
  const blocks = text.match(/[\d\s.]{44,90}/g) || [];
  for(const b of blocks){
    const digits = b.replace(/\D/g,'');
    const m = digits.match(/\d{44}/);
    if(m){ chave = m[0]; break; }
  }
  if(!chave){
    const direct = text.match(/\d{44}/);
    if(direct) chave = direct[0];
  }
  if(!chave) return null;
  const aa = chave.slice(2,4), mm = chave.slice(4,6);
  const nNF = parseInt(chave.slice(25,34), 10);
  const serie = parseInt(chave.slice(22,25), 10);
  return {
    nNF: isNaN(nNF) ? null : String(nNF),
    serie: isNaN(serie) ? null : serie,
    anoMes: '20'+aa+'-'+mm
  };
}

function guessDataEmissao(text, anoMesFallback){
  const dates = text.match(/\d{2}\/\d{2}\/\d{4}/g);
  if(dates && dates.length){
    const [d,m,y] = dates[0].split('/');
    return y+'-'+m+'-'+d;
  }
  if(anoMesFallback) return anoMesFallback+'-01';
  return null;
}

function guessValorTotal(text){
  const nums = text.match(/\d{1,3}(?:\.\d{3})*,\d{2}/g);
  if(!nums || !nums.length) return null;
  const parsed = nums.map(n => parseFloat(n.replace(/\./g,'').replace(',','.')));
  return Math.max(...parsed);
}

function guessNfNumero(text){
  const m = text.match(/N[ºo°]?\s*[:\.]?\s*(\d[\d\.]{2,15})/i);
  if(m) return m[1].replace(/\./g,'');
  return null;
}

function guessQtFaturado(text){
  // a coluna QUANT da tabela de produtos vem no formato "2,0000" (4 casas decimais)
  const nums = text.match(/\b\d+,0000\b/g);
  if(!nums || !nums.length) return null;
  const total = nums.reduce((s,n)=> s + parseFloat(n.replace(',','.')), 0);
  return Math.round(total);
}

function guessPedidoTipo(text){
  const up = text.toUpperCase();

  const ress = up.match(/RESSUPRIMENTO\s+(SEMANAL|MANUAL)?[^]*?PEDIDO\(S\)?\s+DE\s+COMPRA:?\s*(\d+)/);
  if(ress){
    const qualificador = ress[1] ? ' '+ress[1] : '';
    return { pedido: `RESSUPRIMENTO${qualificador}/${ress[2]}`, auto:true };
  }
  const trancheNum = up.match(/TRANCHE\s*(\d+)/);
  if(trancheNum) return { pedido: `TRANCHE ${trancheNum[1]}`, auto:true };
  if(up.includes('TRANCHE')) return { pedido: 'TRANCHE', auto:true };

  if(up.includes('BRINDE')) return { pedido: 'BRINDE', auto:true };
  if(up.includes('MATERIAL') && up.includes('MARKETING')) return { pedido: 'MATERIAL MARKETING', auto:true };

  if(up.includes('NOTA FISCAL DE VENDA') || up.includes('REFERENTE A NOTA FISCAL')){
    return { pedido: 'SEM PEDIDO DE VENDA', auto:true };
  }
  return { pedido: null, auto:false };
}

async function extractTextFromPDF(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  let full = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    full += content.items.map(it=>it.str).join(' ') + '\n';
  }
  return full;
}

    </div>

    <div id="importStatus"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    </div>
  </div>`;
  document.getElementById('overlay').classList.add('open');
}

function renderSeedBox(){
  const counts = STORE_KEYS.map(c=>`${STORE_META[c].shopping}: <b>${state.pedidos[c].length}</b>`).join(' &middot; ');
  return `
    <div class="seed-inner">
      <div>
        <b>Histórico da planilha (2026)</b>
        <div class="muted" style="font-size:12px;margin-top:2px;">${counts}</div>
      </div>
      <button type="button" class="btn btn-primary btn-sm" onclick="importSeedData()">Importar histórico da planilha</button>
    </div>`;
}

function isStubRecord(r){
  return (r.observacoes||'').includes('Importado de PDF') || /^NF-e\s/.test(r.pedido||'');
}
async function importSeedData(){
  let totalAdded = 0, totalUpgraded = 0;
  const touched = new Set();
  for(const code of STORE_KEYS){
    const list = state.pedidos[code];
    const byNF = new Map();
    list.forEach((r,idx)=>{ if(r.nfNumero) byNF.set(r.nfNumero, idx); });

    (SEED_DATA[code]||[]).forEach(seedRec=>{
      if(seedRec.nfNumero && byNF.has(seedRec.nfNumero)){
        const idx = byNF.get(seedRec.nfNumero);
        const existing = list[idx];
        if(isStubRecord(existing)){
          list[idx] = Object.assign({}, seedRec, {id: existing.id});
          touched.add(code);
          totalUpgraded++;
        }
        // else: existing record looks like it already has real/manual data — leave it alone
      } else {
        list.push(Object.assign({id:uid()}, seedRec));
        touched.add(code);
        totalAdded++;
      }
    });
  }
  for(const code of touched) await saveStore(code);
  document.getElementById('seedBox').innerHTML = renderSeedBox();
  const parts = [];
  if(totalAdded) parts.push(`${totalAdded} novo(s)`);
  if(totalUpgraded) parts.push(`${totalUpgraded} atualizado(s) com os dados completos da planilha`);
  alert(parts.length ? parts.join(' · ') : 'Nada novo para importar — os pedidos do histórico já estão todos lançados e completos.');
  render();
}

async function handlePdfFiles(fileList, currentStore){
  const files = Array.from(fileList);
  if(!files.length) return;
  const statusEl = document.getElementById('importStatus');
  statusEl.innerHTML = `<p class="muted" style="margin-top:16px;">Lendo ${files.length} arquivo(s)…</p>`;

  for(const file of files){
    try{
      const text = await extractTextFromPDF(file);
      const chave = decodeChave(text);
      const lojaAuto = detectLoja(text);
      const dataISO = guessDataEmissao(text, chave ? chave.anoMes : null);
      const valor = guessValorTotal(text);
      const nfNum = (chave && chave.nNF) || guessNfNumero(text);
      const qtF = guessQtFaturado(text);
      const tipo = guessPedidoTipo(text);
      const mismatch = lojaAuto && lojaAuto !== currentStore;
      importPreview.push({
        _uid: uid(),
        fileName: file.name,
        loja: currentStore,
        lojaAuto: !mismatch,
        data: dataISO || todayISO(),
        dataAuto: !!dataISO,
        pedido: tipo.pedido || ('NF-e '+(nfNum||'?')),
        pedidoAuto: tipo.auto,
        nfNumero: nfNum || '',
        nfAuto: !!nfNum,
        qtFaturado: qtF!=null ? qtF : '',
        qtFaturadoAuto: qtF!=null,
        valorFaturado: valor!=null ? valor.toFixed(2) : '',
        valorAuto: valor!=null,
        warn: mismatch ? `O texto do PDF parece ser da loja ${STORE_META[lojaAuto].nome}, não de ${STORE_META[currentStore].nome}. Confira antes de importar.` : null
      });
    }catch(e){
      importPreview.push({
        _uid: uid(), fileName: file.name, loja: currentStore, lojaAuto:false,
        data: todayISO(), dataAuto:false, pedido:'NF-e (erro na leitura)', pedidoAuto:false, nfNumero:'', nfAuto:false,
        qtFaturado:'', qtFaturadoAuto:false, valorFaturado:'', valorAuto:false, warn:'Não foi possível ler este PDF automaticamente. Preencha manualmente.'
      });
    }
  }
  renderImportPreview();
}

function renderImportPreview(){
  const statusEl = document.getElementById('importStatus');
  if(!importPreview.length){ statusEl.innerHTML=''; return; }
  const rows = importPreview.map(r=>`
    <tr>
      <td class="muted" title="${esc(r.fileName)}">${esc(r.fileName.length>18?r.fileName.slice(0,16)+'…':r.fileName)}</td>
      <td>
        <select onchange="updatePreview('${r._uid}','loja',this.value)">
          ${STORE_KEYS.map(c=>`<option value="${c}" ${r.loja===c?'selected':''}>${STORE_META[c].nome}</option>`).join('')}
        </select>
        ${r.lojaAuto?'<div class="badge-auto">detectado</div>':'<div class="badge-manual">confira</div>'}
      </td>
      <td><input type="date" value="${r.data}" onchange="updatePreview('${r._uid}','data',this.value)">
        ${r.dataAuto?'<div class="badge-auto">lido do PDF</div>':'<div class="badge-manual">confira</div>'}
      </td>
      <td><input type="text" value="${esc(r.pedido)}" onchange="updatePreview('${r._uid}','pedido',this.value)">
        ${r.pedidoAuto?'<div class="badge-auto">identificado no PDF</div>':'<div class="badge-manual">confira</div>'}
      </td>
      <td><input type="text" value="${esc(r.nfNumero)}" onchange="updatePreview('${r._uid}','nfNumero',this.value)">
        ${r.nfAuto?'<div class="badge-auto">lido do PDF</div>':'<div class="badge-manual">confira</div>'}
      </td>
      <td><input type="number" step="1" value="${r.qtFaturado}" onchange="updatePreview('${r._uid}','qtFaturado',this.value)" style="width:70px;">
        ${r.qtFaturadoAuto?'<div class="badge-auto">somado do PDF</div>':'<div class="badge-manual">confira</div>'}
      </td>
      <td><input type="number" step="0.01" value="${r.valorFaturado}" onchange="updatePreview('${r._uid}','valorFaturado',this.value)">
        ${r.valorAuto?'<div class="badge-auto">lido do PDF</div>':'<div class="badge-manual">confira</div>'}
      </td>
      <td><button class="btn btn-danger btn-sm" onclick="removePreview('${r._uid}')">Remover</button></td>
    </tr>
    ${r.warn ? `<tr><td colspan="8" style="color:var(--red);font-size:11.5px;padding:0 8px 8px;">${esc(r.warn)}</td></tr>` : ''}
  `).join('');

  statusEl.innerHTML = `
    <p class="import-note">${importPreview.length} nota(s) lida(s). Campos marcados "confira" não foram identificados com certeza — ajuste antes de importar. O valor do DAE será sugerido automaticamente em 16% do valor faturado.</p>
    <div class="import-table-wrap">
      <table class="import-table">
        <thead><tr><th>Arquivo</th><th>Loja</th><th>Data</th><th>Pedido</th><th>Nº NF</th><th>Qtd faturada</th><th>Valor faturado</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button type="button" class="btn btn-primary" onclick="confirmImport()">Importar ${importPreview.length} nota(s)</button>
    </div>`;
}
function updatePreview(uidVal, field, val){
  const r = importPreview.find(x=>x._uid===uidVal);
  if(r) r[field] = val;
}
function removePreview(uidVal){
  importPreview = importPreview.filter(x=>x._uid!==uidVal);
  renderImportPreview();
  if(!importPreview.length) closeModal();
}
async function confirmImport(){
  const touched = new Set();
  importPreview.forEach(r=>{
    const vf = parseFloat(r.valorFaturado)||0;
    const record = {
      id: uid(),
      loja: r.loja,
      data: r.data,
      pedido: r.pedido.trim() || 'NF-e '+(r.nfNumero||'?'),
      nfNumero: (r.nfNumero||'').trim(),
      qt: null, valor: null, qtFaturado: r.qtFaturado!=='' && r.qtFaturado!=null ? parseFloat(r.qtFaturado) : null,
      valorFaturado: vf,
      valorDae: Number((vf*DAE_RATE).toFixed(2)),
      vencimento: null,
      previsaoEntrega: null,
      recebimento: null,
      observacoes: 'Importado de PDF (DANFE)',
      status: 'pendente',
      dataPagamento: null,
      valorPago: null
    };
    state.pedidos[r.loja].push(record);
    touched.add(r.loja);
  });
  for(const code of touched) await saveStore(code);
  importPreview = [];
  closeModal();
  render();
}


// ---------- init ----------
(function init(){
  render();
})();
</script>
